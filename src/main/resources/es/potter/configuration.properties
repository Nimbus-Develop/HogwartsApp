# CREDENCIALES DE BASES DE DATOS - MULTI-BD
# ============================================================
# Archivo centralizado con credenciales de todas las BDs
# Configurado para conectar con los contenedores Docker
# Ver docker-compose.yml y .env para cambiar puertos/contraseñas
# ============================================================

# ============================================================
# ORACLE
# URL PDB: jdbc:oracle:thin:@localhost:1521/XEPDB1
# Usuario: appuser (creado automáticamente por el contenedor)
# ============================================================
db.oracle.url=jdbc:oracle:thin:@localhost:1521/XEPDB1
db.oracle.user=appuser
db.oracle.password=password123

# ============================================================
# H2
# Servidor TCP en puerto 9092 | Web Console en 8082
# ============================================================
db.h2.url=jdbc:h2:tcp://localhost:9092/hogwarts
db.h2.user=sa
db.h2.password=

# ============================================================
# APACHE DERBY
# Servidor de red en puerto 1527
# ============================================================
db.derby.url=jdbc:derby://localhost:1527/hogwarts
db.derby.user=APP
db.derby.password=

# ============================================================
# HSQLDB
# Servidor en puerto 9001 | dbname configurado como 'mydb'
# ============================================================
db.hsqldb.url=jdbc:hsqldb:hsql://localhost:9001/mydb
db.hsqldb.user=SA
db.hsqldb.password=

# ============================================================
# MARIADB / MySQL
# Puerto host 3307 mapeado al 3306 del contenedor
# Base de datos maestra: hogwarts
# ============================================================
db.mariadb.url=jdbc:mariadb://localhost:3307/hogwarts
db.mariadb.user=admin
db.mariadb.password=password123

# ============================================================
# SQLite (Base de datos embebida - fichero local)
# No requiere contenedor Docker, la app accede al fichero directamente
# El contenedor sqlite-init crea y puebla este fichero al arrancar
# ============================================================
db.sqlite.url=jdbc:sqlite:src/main/resources/es/potter/db/hogwarts.db
db.sqlite.user=
db.sqlite.password=